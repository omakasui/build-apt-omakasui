# Source of truth for omakasui- package versions.
# Pushing a change here triggers a build in CI.
# depends_on: packages from omakasui/build-apt-packages required at Docker build time.
#
# External deps (external: true) are packages from omakasui/build-apt-packages.
# They are NOT built in this repo and are excluded from CI matrices and lint.
# No version is pinned here — build.sh always fetches the latest release
# published for that package by omakasui/build-apt-packages.

omakasui-nvim:
  version: "20260327.2"
  depends_on:
    - nvim
omakasui-walker:
  version: "20260330.1"
  depends_on: []
omakasui-zellij:
  version: "20260408.1"
  depends_on: []

# External Deps (from omakasui/build-packages)

nvim:
  depends_on: []
  external: true

# Omari core packages (built from omakasui/omari-os)

omakasui-archive-keyring:
  version: "1.0.0"
  depends_on: []
omari-base-files:
  version: "1.0.0-testing1"
  depends_on: []
omari-meta:
  version: "1.0.0-testing1"
  depends_on: []
calamares-settings-omari:
  version: "1.0.0-testing1"
  depends_on: []
omari-settings:
  version: "1.0.0-testing1"
  depends_on: []
