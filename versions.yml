# Source of truth for omakasui- package versions.
# Pushing a change here triggers a build in CI.
# depends_on: sibling packages required at build time (empty [] if none).
#
# External deps (external: true) are packages from omakasui/build-packages.
# They are listed here only so download-deps.sh can resolve their versions.
# They are NOT built in this repo and are excluded from CI matrices and lint.

gnome-shell-extension-grimble-tiling-wm:
  version: "1.3.0"
  depends_on: []
omakasui-nvim:
  version: "20260327.2"
  depends_on:
    - nvim
omakasui-walker:
  version: "20260330.1"
  depends_on:
    - walker
    - elephant
omakasui-zellij:
  version: "20260408.1"
  depends_on:
    - zellij

# External Deps (from omakasui/build-packages)

elephant:
  version: "2.21.0"
  depends_on: []
  external: true
nvim:
  version: "0.12.2"
  depends_on: []
  external: true
walker:
  version: "2.16.1-omakasui1"
  depends_on: []
  external: true
zellij:
  version: "0.44.1"
  depends_on: []
  external: true

# Omari core packages (built from omakasui/omari-os)

omakasui-archive-keyring:
  version: "1.0.0"
  depends_on: []
omari-base-files:
  version: "1.0.0-testing1"
  depends_on: []
omari-meta:
  version: "1.0.0-testing1"
  depends_on: []
calamares-settings-omari:
  version: "1.0.0-testing1"
  depends_on: []
omari-settings:
  version: "1.0.0-testing1"
  depends_on: []
