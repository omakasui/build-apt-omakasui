# Triggered on versions.yml changes (detects which packages changed) or manually.
# External deps (external: true in versions.yml) are never built.
name: Build package

on:
  push:
    branches:
      - main
    paths:
      - 'versions.yml'

  workflow_dispatch:
    inputs:
      package:
        description: 'Package to build (must exist in versions.yml, must not be external: true). Leave empty when using distro.'
        required: false
        type: string
      distro:
        description: 'Build ALL packages for a specific distro (e.g. ubuntu2604). Leave empty when using package.'
        required: false
        type: choice
        options:
          - ''
          - debian13
          - ubuntu2404
          - ubuntu2604
      rebuild_all:
        description: 'Rebuild ALL packages for ALL distros (ignores package/distro inputs)'
        required: false
        type: boolean
        default: false
      channel:
        description: 'Publishing channel (stable or dev)'
        required: false
        default: 'dev'
        type: choice
        options:
          - dev
          - stable

jobs:
  detect:
    name: Detect package
    runs-on: ubuntu-latest
    outputs:
      builds: ${{ steps.resolve.outputs.builds }}
      build_matrix: ${{ steps.resolve.outputs.build_matrix }}
      core_builds: ${{ steps.core.outputs.core_builds || '[]' }}
      core_build_matrix: ${{ steps.core.outputs.core_build_matrix || '{"include":[]}' }}
      dependent_builds: ${{ steps.filter.outputs.dependent_builds }}
      dependent_build_matrix: ${{ steps.filter.outputs.dependent_build_matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Install yq
        run: bash scripts/install-yq.sh

      - name: Resolve packages and versions
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.rebuild_all }}" == "true" ]]; then
              bash scripts/detect-changes.sh --mode all
            elif [[ -n "${{ inputs.distro }}" ]]; then
              bash scripts/detect-changes.sh --mode distro --distro "${{ inputs.distro }}"
            else
              bash scripts/detect-changes.sh --mode dispatch --package "${{ inputs.package }}"
            fi
          else
            bash scripts/detect-changes.sh --mode push
          fi

      - name: Compute core dependency subsets
        id: core
        if: inputs.package == ''
        run: |
          # Packages listed as depends_on targets — must be released before dependents build.
          CORE_PKGS=$(yq e '.[] | select(.depends_on | length > 0) | .depends_on[]' \
            versions.yml 2>/dev/null | sort -u | xargs)

          if [[ -z "$CORE_PKGS" ]]; then
            echo "core_builds=[]"                    >> "$GITHUB_OUTPUT"
            echo 'core_build_matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            echo 'core_pkg_json=[]'                  >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CORE_PKG_JSON=$(echo "$CORE_PKGS" | tr ' ' '\n' | jq -R . | jq -sc .)
          BUILDS='${{ steps.resolve.outputs.builds }}'
          BUILD_MATRIX='${{ steps.resolve.outputs.build_matrix }}'

          echo "core_builds=$(echo "$BUILDS" | jq -c \
            --argjson pkgs "$CORE_PKG_JSON" \
            '[.[] | select(.package as $p | $pkgs | index($p) != null)]')" \
            >> "$GITHUB_OUTPUT"
          echo "core_build_matrix=$(echo "$BUILD_MATRIX" | jq -c \
            --argjson pkgs "$CORE_PKG_JSON" \
            '{include: [.include[] | select(.package as $p | $pkgs | index($p) != null)]}')" \
            >> "$GITHUB_OUTPUT"
          echo "core_pkg_json=${CORE_PKG_JSON}" >> "$GITHUB_OUTPUT"

      - name: Filter dependent (non-core) matrices
        id: filter
        run: |
          BUILDS='${{ steps.resolve.outputs.builds }}'
          BUILD_MATRIX='${{ steps.resolve.outputs.build_matrix }}'
          CORE_PKG_JSON='${{ steps.core.outputs.core_pkg_json || '[]' }}'

          echo "dependent_builds=$(echo "$BUILDS" | jq -c \
            --argjson pkgs "$CORE_PKG_JSON" \
            '[.[] | select(.package as $p | $pkgs | index($p) == null)]')" \
            >> "$GITHUB_OUTPUT"
          echo "dependent_build_matrix=$(echo "$BUILD_MATRIX" | jq -c \
            --argjson pkgs "$CORE_PKG_JSON" \
            '{include: [.include[] | select(.package as $p | $pkgs | index($p) == null)]}')" \
            >> "$GITHUB_OUTPUT"

  # build-core would run here if any internal core deps existed
  build-core:
    name: "[core] Build ${{ matrix.package }} / ${{ matrix.distro }} / ${{ matrix.arch }}"
    needs: detect
    if: inputs.package == '' && needs.detect.outputs.core_build_matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.core_build_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install yq
        run: bash scripts/install-yq.sh
      - name: Check arch
        id: check
        run: |
          PKG="${{ matrix.package }}"
          PKG_ARCH=$(yq e '.arch // ""' "packages/${PKG}/package.yml")
          if [[ "$PKG_ARCH" == "all" && "${{ matrix.arch }}" == "arm64" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif [[ -n "$PKG_ARCH" && "$PKG_ARCH" != "all" && "$PKG_ARCH" != "${{ matrix.arch }}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup QEMU (arm64)
        if: matrix.arch == 'arm64' && steps.check.outputs.skip != 'true'
        uses: docker/setup-qemu-action@v4
      - name: Setup Docker Buildx
        if: steps.check.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v4
      - name: Build package
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.BUILD_PKG_DISPATCH_TOKEN }}
        run: |
          bash scripts/build.sh "${{ matrix.package }}" \
            --distro "${{ matrix.distro }}" \
            --arch   "${{ matrix.arch }}" \
            --output-dir output
      - name: Upload artifact
        if: steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.package }}-${{ matrix.distro }}-${{ matrix.arch }}
          path: output/*.deb
          if-no-files-found: ignore
          retention-days: 1

  release-core:
    name: "[core] Release ${{ matrix.package_entry.package }}"
    needs: [detect, build-core]
    if: inputs.package == '' && needs.detect.outputs.core_builds != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        package_entry: ${{ fromJson(needs.detect.outputs.core_builds) }}
    steps:
      - name: Download artifacts for this package
        uses: actions/download-artifact@v7
        with:
          path: artifacts/
          pattern: ${{ matrix.package_entry.package }}-*
          merge-multiple: true
      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.package_entry.package }}-${{ matrix.package_entry.version }}
          name: "${{ matrix.package_entry.package }} v${{ matrix.package_entry.version }}"
          files: artifacts/*.deb
          fail_on_unmatched_files: true
          make_latest: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build ${{ matrix.package }} / ${{ matrix.distro }} / ${{ matrix.arch }}
    needs: [detect, release-core]
    if: "!failure() && !cancelled() && needs.detect.outputs.dependent_builds != '[]'"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.dependent_build_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install yq
        run: bash scripts/install-yq.sh

      - name: Check arch
        id: check
        run: |
          PKG="${{ matrix.package }}"
          PKG_ARCH=$(yq e '.arch // ""' "packages/${PKG}/package.yml")
          if [[ "$PKG_ARCH" == "all" && "${{ matrix.arch }}" == "arm64" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif [[ -n "$PKG_ARCH" && "$PKG_ARCH" != "all" && "$PKG_ARCH" != "${{ matrix.arch }}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup QEMU (arm64)
        if: matrix.arch == 'arm64' && steps.check.outputs.skip != 'true'
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        if: steps.check.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build package
        if: steps.check.outputs.skip != 'true'
        env:
          # GH_TOKEN needed by build.sh to download depends_on .deb files from build-apt-packages.
          GH_TOKEN: ${{ secrets.BUILD_PKG_DISPATCH_TOKEN }}
        run: |
          bash scripts/build.sh "${{ matrix.package }}" \
            --distro "${{ matrix.distro }}" \
            --arch   "${{ matrix.arch }}" \
            --output-dir output

      - name: Upload artifact
        if: steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.package }}-${{ matrix.distro }}-${{ matrix.arch }}
          path: output/*.deb
          if-no-files-found: ignore
          retention-days: 1

  release:
    name: Create GitHub Release — ${{ matrix.package_entry.package }}
    needs: [detect, build]
    if: "!failure() && !cancelled() && needs.detect.outputs.dependent_builds != '[]'"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        package_entry: ${{ fromJson(needs.detect.outputs.dependent_builds) }}

    steps:
      - name: Download artifacts for this package
        uses: actions/download-artifact@v7
        with:
          path: artifacts/
          pattern: ${{ matrix.package_entry.package }}-*
          merge-multiple: true

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.package_entry.package }}-${{ matrix.package_entry.version }}
          name: "${{ matrix.package_entry.package }} v${{ matrix.package_entry.version }}"
          files: artifacts/*.deb
          fail_on_unmatched_files: true
          make_latest: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trigger-apt-update:
    name: Trigger apt-omakasui (batch)
    needs: [detect, release]
    if: "!failure() && !cancelled() && needs.detect.outputs.builds != '[]'"
    runs-on: ubuntu-latest

    steps:
      - name: Build batch payload and dispatch
        env:
          GH_TOKEN: ${{ secrets.APT_OMAKASUI_DISPATCH_TOKEN }}
        run: |
          # workflow_dispatch: all packages use inputs.channel.
          # push: per-package channel from versions.yml; stable → registered to both stable and dev.
          CHANNEL="${{ inputs.channel }}"
          EVENT="${{ github.event_name }}"
          PAYLOAD=$(echo '${{ needs.detect.outputs.builds }}' | jq -c \
            --arg global_channel "$CHANNEL" \
            --arg event "$EVENT" \
            '[.[] | {
              package: .package,
              version: .version,
              suites: ( .matrix.include | map(.suite) | unique | join(" ") ),
              produces: .produces,
              channel: (if $event == "workflow_dispatch" then $global_channel else (.channel // "dev") end)
            } | if $event != "workflow_dispatch" and .channel == "stable" then ., (. + {channel: "dev"}) else . end]')

          BODY=$(jq -cn --argjson packages "$PAYLOAD" '{
            event_type: "packages-updated",
            client_payload: { packages: $packages }
          }')

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/omakasui/apt-omakasui/dispatches \
            --input - <<< "$BODY"
